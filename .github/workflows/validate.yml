name: Validate SVG

on:
  pull_request:
    paths:
      - "**/*.svg"
      - "scripts/validate-svg.mjs"
      - "package.json"
  push:
    branches: [main]
    paths:
      - "**/*.svg"
      - "scripts/validate-svg.mjs"
      - "package.json"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm run validate
